<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw — Starting</title>
  <meta http-equiv="refresh" content="5" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { text-align: center; padding: 2rem; max-width: 420px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:48px;height:48px;margin:0 auto 1rem;">
      <circle cx="32" cy="32" r="30" fill="url(#oc-grad-l)" />
      <path d="M20 38c2-6 6-12 12-14s10 2 12 8c1 4-1 8-4 10s-8 2-12-1c-3-2-5-5-4-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none" opacity=".9"/>
      <circle cx="35" cy="28" r="2.5" fill="#fff" opacity=".85"/>
      <path d="M26 22c-3-6-1-10 2-11M38 20c2-7 6-9 9-7" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".7"/>
      <defs><linearGradient id="oc-grad-l" x1="0" y1="0" x2="64" y2="64"><stop stop-color="#ef4444"/><stop offset="1" stop-color="#dc2626"/></linearGradient></defs>
    </svg>
    <div class="spinner"></div>
    <h1>OpenClaw is starting</h1>
    <p>The gateway is initializing. This page will refresh automatically.</p>
  </div>
</body>
</html>
